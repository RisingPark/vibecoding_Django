{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}회원가입 - 메모짱{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-person-plus"></i> 회원가입</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> 가입하기
                        </button>
                    </div>
                </form>
                <hr>
                <p class="text-center mb-0">
                    이미 계정이 있으신가요? <a href="{% url 'login' %}">로그인</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
