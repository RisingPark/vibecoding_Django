{% extends 'base.html' %}

{% block title %}메모 삭제 - 메모짱{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">
                    <i class="bi bi-exclamation-triangle"></i> 메모 삭제 확인
                </h4>
            </div>
            <div class="card-body">
                <p class="mb-3">정말로 다음 메모를 삭제하시겠습니까?</p>
                <div class="alert alert-warning">
                    <strong>제목:</strong> {{ memo.title }}<br>
                    <strong>작성일:</strong> {{ memo.created_at|date:"Y-m-d H:i" }}
                </div>
                <p class="text-danger">
                    <i class="bi bi-exclamation-circle"></i> 
                    <strong>주의:</strong> 이 작업은 되돌릴 수 없습니다!
                </p>
                
                <form method="POST" class="d-flex justify-content-between">
                    {% csrf_token %}
                    <a href="{% url 'memo_detail' memo.pk %}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> 취소
                    </a>
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> 삭제하기
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
