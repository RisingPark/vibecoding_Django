{% extends 'base.html' %}

{% block title %}{{ memo.title }} - 메모짱{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    <i class="bi bi-journal-text"></i> {{ memo.title }}
                </h4>
            </div>
            <div class="card-body">
                <div class="memo-content mb-4" style="white-space: pre-wrap;">{{ memo.content }}</div>
                
                <div class="text-muted small mb-3">
                    <p class="mb-1">
                        <i class="bi bi-calendar-plus"></i> 작성일: {{ memo.created_at|date:"Y년 m월 d일 H:i" }}
                    </p>
                    <p class="mb-0">
                        <i class="bi bi-calendar-check"></i> 수정일: {{ memo.updated_at|date:"Y년 m월 d일 H:i" }}
                    </p>
                </div>
            </div>
            <div class="card-footer bg-transparent">
                <div class="d-flex justify-content-between">
                    <a href="{% url 'memo_list' %}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> 목록으로
                    </a>
                    <div>
                        <a href="{% url 'memo_update' memo.pk %}" class="btn btn-warning">
                            <i class="bi bi-pencil"></i> 수정
                        </a>
                        <a href="{% url 'memo_delete' memo.pk %}" class="btn btn-danger">
                            <i class="bi bi-trash"></i> 삭제
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
